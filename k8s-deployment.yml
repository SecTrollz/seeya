---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: esim-proxy
  labels:
    name: esim-proxy

---
# ConfigMap for static configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: esim-proxy-config
  namespace: esim-proxy
data:
  BACKEND_URL: "https://api.internal.example.com"
  PORT: "8080"
  RATE_LIMIT: "500"  # Higher for K8s load

---
# Secret for API keys (create with: kubectl create secret generic esim-keys --from-literal=keys="key1,key2")
apiVersion: v1
kind: Secret
metadata:
  name: esim-keys
  namespace: esim-proxy
type: Opaque
stringData:
  keys: |
    sk_prod_key_1
    sk_prod_key_2
    sk_prod_key_3

---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: esim-proxy
  namespace: esim-proxy

---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: esim-proxy
  namespace: esim-proxy
  labels:
    app: esim-proxy
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: esim-proxy
  template:
    metadata:
      labels:
        app: esim-proxy
        version: v1
      annotations:
        prometheus.io/scrape: "false"
        prometheus.io/port: "8080"
    spec:
      serviceAccountName: esim-proxy
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: esim-proxy
        image: esim-proxy:latest
        imagePullPolicy: IfNotPresent
        
        # Security Context
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
              - ALL
        
        # Ports
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        
        # Environment from ConfigMap
        envFrom:
        - configMapRef:
            name: esim-proxy-config
        
        # Environment from Secret
        env:
        - name: API_KEYS
          valueFrom:
            secretKeyRef:
              name: esim-keys
              key: keys
        
        # Resources
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        # Probes
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 3
          failureThreshold: 3
        
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 2
        
        # Volume mounts
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        
        # Logging
        stdout: /dev/stdout
        stderr: /dev/stderr
      
      # Volumes
      volumes:
      - name: tmp
        emptyDir: {}
      
      # Pod disruption budget for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - esim-proxy
              topologyKey: kubernetes.io/hostname

---
# Service
apiVersion: v1
kind: Service
metadata:
  name: esim-proxy
  namespace: esim-proxy
  labels:
    app: esim-proxy
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    protocol: TCP
    name: http
  selector:
    app: esim-proxy

---
# Horizontal Pod Autoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: esim-proxy-hpa
  namespace: esim-proxy
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: esim-proxy
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 30
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max

---
# NetworkPolicy (optional, for network segmentation)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: esim-proxy-netpol
  namespace: esim-proxy
spec:
  podSelector:
    matchLabels:
      app: esim-proxy
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 443  # HTTPS to backend
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53   # DNS
    - protocol: UDP
      port: 53

---
# PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: esim-proxy-pdb
  namespace: esim-proxy
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: esim-proxy
