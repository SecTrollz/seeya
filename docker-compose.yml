version: '3.8'

services:
  esim-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esim-proxy-server
    ports:
      - "8080:8080"
    environment:
      BACKEND_URL: https://api.internal.example.com
      API_KEYS: ${API_KEYS:-test-key-1,test-key-2}
      PORT: "8080"
      RATE_LIMIT: ${RATE_LIMIT:-100}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    read_only_root_filesystem: true
    tmpfs:
      - /tmp

  # Optional: Prometheus metrics exporter sidecar
  # metrics:
  #   image: prom/prometheus:latest
  #   volumes:
  #     - ./prometheus.yml:/etc/prometheus/prometheus.yml
  #   ports:
  #     - "9090:9090"
  #   command:
  #     - '--config.file=/etc/prometheus/prometheus.yml'

networks:
  default:
    name: esim-proxy-network
    driver: bridge
